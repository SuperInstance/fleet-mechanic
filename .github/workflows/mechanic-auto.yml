name: Mechanic Auto-Run
on:
  issues:
    types: [labeled]
  repository_dispatch:
    types: [mechanic-run]
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to execute'
        required: false
        default: 'health-scan'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pytest
      - name: Execute mechanic task
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔧 Fleet Mechanic triggered by: ${{ github.event_name }}"
          echo "$GITHUB_TOKEN" > /tmp/.mechanic_token
          python3 scan_fleet.py 2>&1 | tee mechanic-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mechanic-report
          path: mechanic-report.txt
      - uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('mechanic-report.txt', 'utf8');
            core.summary.addRaw(report);
            await core.summary.write();
